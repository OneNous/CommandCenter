<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1280"/>
<title>CoilShield ICCP — Mobile App</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&display=swap"/>
<style>
  html, body { margin: 0; padding: 0; background: #05070a; font-family: "Geist", system-ui, sans-serif; color: #f5f7fb; }
  *, *::before, *::after { box-sizing: border-box; }
  @keyframes cs-spin  { to { transform: rotate(360deg); } }
  @keyframes cs-pulse { 0%,100% { opacity: 1 } 50% { opacity: .45 } }
  @keyframes as-drift {
    from { transform: translate3d(-1.8%, 1.1%, 0); }
    to   { transform: translate3d(2.1%, -1.5%, 0); }
  }
  /* slim scrollbars inside the device frames */
  ::-webkit-scrollbar { width: 0; height: 0; }
  button:focus-visible, input:focus-visible {
    outline: 2px solid #7dd3fc; outline-offset: 2px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="artsky.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
